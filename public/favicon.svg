<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Gradiente oficial de la marca Caleta -->
    <linearGradient id="fav-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9079ff" />
      <stop offset="100%" stop-color="#0bd570" />
    </linearGradient>
    
    <!-- Gradiente oscuro de fondo para máxima legibilidad en temas claros/oscuros -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Filtro de brillo neón para el tesoro y destellos -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Máscara circular para recortar el terreno dentro del badge -->
    <clipPath id="badge-clip">
      <circle cx="50" cy="50" r="47" />
    </clipPath>
  </defs>

  <!-- Fondo del Badge Circular -->
  <circle cx="50" cy="50" r="47" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="1.5" />

  <!-- Elementos recortados dentro del círculo -->
  <g clip-path="url(#badge-clip)">
    <!-- Relleno de Tierra (Suelo) -->
    <path d="M -10,55 H 35 C 38,55 38,80 50,80 C 62,80 62,55 65,55 H 110 V 110 H -10 Z" fill="#151e33" />
    
    <!-- Raíces estilizadas bajo tierra -->
    <path d="M 22,55 Q 20,63 24,68 T 21,76" stroke="#9079ff" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5" />
    <path d="M 78,55 Q 81,64 77,71 T 82,81" stroke="#9079ff" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5" />
    <path d="M 88,55 Q 86,60 89,66" stroke="#9079ff" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4" />

    <!-- Montones de tierra en la superficie -->
    <path d="M 8,55 C 12,49 18,49 22,55" fill="#151e33" stroke="#9079ff" stroke-width="1.5" opacity="0.8" />
    <path d="M 72,55 C 76,49 82,49 86,55" fill="#151e33" stroke="#9079ff" stroke-width="1.5" opacity="0.8" />

    <!-- Línea de Césped / Capa Superior (Verde Neón) -->
    <path d="M -10,55 H 35 C 38,55 38,80 50,80 C 62,80 62,55 65,55 H 110" stroke="#0bd570" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />

    <!-- Tesoro Oculto Brillante (Moneda de Caleta) -->
    <!-- Brillo de fondo -->
    <circle cx="50" cy="69" r="6" fill="#0bd570" filter="url(#neon-glow)" opacity="0.85" />
    <!-- Cuerpo de la moneda -->
    <circle cx="50" cy="69" r="5" fill="url(#fav-grad)" stroke="#ffffff" stroke-width="1" />
    <!-- Destello interior en cruz -->
    <path d="M 50,65.5 Q 50,69 46.5,69 Q 50,69 50,72.5 Q 50,69 53.5,69 Q 50,69 50,65.5 Z" fill="#ffffff" />

    <!-- Pala (Clavada a la izquierda del hoyo) -->
    <g transform="translate(27, 54) rotate(-22)">
      <!-- Cuello de conexión -->
      <path d="M -1.5,-8 V -11 H 1.5 V -8 Z" fill="#cbd5e1" />
      <!-- Hoja / Metal de la pala -->
      <path d="M -6,-8 H 6 C 6,-3.5 5,1 2.5,4 L 0,6.5 L -2.5,4 C -5,1 -6,-3.5 -6,-8 Z" fill="url(#fav-grad)" stroke="#cbd5e1" stroke-width="1.2" stroke-linejoin="round" />
      <!-- Mango / Astil -->
      <line x1="0" y1="-11" x2="0" y2="-29" stroke="#cbd5e1" stroke-width="2.2" stroke-linecap="round" />
      <!-- Asa (D-Grip) -->
      <path d="M -3.5,-29 V -35 C -3.5,-37 -2,-38.5 0,-38.5 C 2,-38.5 3.5,-37 3.5,-35 V -29" stroke="#cbd5e1" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Barra de agarre central -->
      <line x1="-2" y1="-34.5" x2="2" y2="-34.5" stroke="#cbd5e1" stroke-width="1.8" stroke-linecap="round" />
    </g>
  </g>

  <!-- Destellos mágicos subiendo del hoyo -->
  <!-- Destello 1 (Púrpura) -->
  <path d="M 60,42 Q 60,45 57,45 Q 60,45 60,48 Q 60,45 63,45 Q 60,45 60,42 Z" fill="#9079ff" filter="url(#neon-glow)" opacity="0.75" />
  <path d="M 60,42 Q 60,45 57,45 Q 60,45 60,48 Q 60,45 63,45 Q 60,45 60,42 Z" fill="#ffffff" />

  <!-- Destello 2 (Verde Neón) -->
  <path d="M 40,36 Q 40,38.5 37.5,38.5 Q 40,38.5 40,41 Q 40,38.5 42.5,38.5 Q 40,38.5 40,36 Z" fill="#0bd570" filter="url(#neon-glow)" opacity="0.85" />
  <path d="M 40,36 Q 40,38.5 37.5,38.5 Q 40,38.5 40,41 Q 40,38.5 42.5,38.5 Q 40,38.5 40,36 Z" fill="#ffffff" />
  
  <!-- Destello 3 (Blanco Puro, arriba) -->
  <path d="M 51,30 Q 51,32 49,32 Q 51,32 51,34 Q 51,32 53,32 Q 51,32 51,30 Z" fill="#ffffff" />
</svg>
